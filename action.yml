name: 'Suppress Ratchet'
description: 'Block new linter suppressions (eslint-disable, biome-ignore, noqa, pylint: disable) from creeping into a linted codebase.'
author: 'motchalini'
branding:
  icon: 'eye-off'
  color: 'purple'

inputs:
  language:
    description: 'python | typescript | auto (auto detects from pyproject.toml / tsconfig.json)'
    required: false
    default: 'auto'
  paths:
    description: 'Space-separated directories to scan.'
    required: false
    default: '.'
  baseline-suppress:
    description: 'Max allowed linter-suppression count. Fails if the count exceeds this.'
    required: false
    default: '0'
  baseline-file:
    description: 'Optional file defining SUP_BASELINE (overrides the numeric input).'
    required: false
    default: ''
  lint-command:
    description: 'Optional command also run as part of the gate (e.g. "pnpm exec eslint ." or "uv run ruff check").'
    required: false
    default: ''
  working-directory:
    description: 'Directory to run in.'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        INPUT_LANGUAGE: ${{ inputs.language }}
        INPUT_PATHS: ${{ inputs.paths }}
        INPUT_BASELINE_SUPPRESS: ${{ inputs.baseline-suppress }}
        INPUT_BASELINE_FILE: ${{ inputs.baseline-file }}
        INPUT_LINT_COMMAND: ${{ inputs.lint-command }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
      run: bash "$GITHUB_ACTION_PATH/gate.sh"
